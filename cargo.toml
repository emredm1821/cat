[package]
name = "cat"
version = "0.1.0"
edition = "2021"
 
[[bin]]
name = "cat"
path = "src/main.rs"
 
[dependencies]
clap = { version = "4.5", features = ["derive"] }
syntect = "5.2"
pulldown-cmark = "0.10.3"
 
[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
